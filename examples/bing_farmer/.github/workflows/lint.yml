name: AutoRewarder Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    # pep8, code formatting, and type checking
    - name: Run Black
      run: |
        black . --check

    # linting
    - name: Run Flake8
      run: |
        flake8 .

    # type checking
    # Add --ignore-missing-imports if you want to ignore missing type hints in third-party/old libraries
    - name: Run MyPy
      run: |
        mypy .
