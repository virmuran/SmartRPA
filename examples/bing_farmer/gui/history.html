<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Query History</title>

  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="history.css">
</head>
<body>

  <div class="history-header">
    <h2 class="history-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      Execution history
    </h2>
    <span id="account_pill" class="account-pill" hidden></span>
  </div>

  <table class="history-table">
    <thead>
      <tr>
        <th class="col-date">Date</th>
        <th class="col-time">Time</th>
        <th class="col-query">Query</th>
        <th class="col-status">Status</th>
      </tr>
    </thead>
    <tbody id="table_body">
      <tr>
        <td colspan="4" class="empty-row">Loading…</td>
      </tr>
    </tbody>
  </table>

  <script>
    function avatar_initials_hist(label) {
      const s = (label || '?').trim();
      if (!s) return '?';
      const parts = s.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2);
      return (parts[0][0] + parts[parts.length - 1][0]);
    }

    window.addEventListener('pywebviewready', function() {

      pywebview.api.get_current_account().then(function(account) {
        const pill = document.getElementById('account_pill');
        if (!pill) return;
        if (account) {
          pill.hidden = false;
          pill.innerHTML = '';
          const avatar = document.createElement('span');
          avatar.className = 'avatar avatar-sm';
          // Deterministic color (same palette as main UI).
          const palette = ['#5b8eff', '#e879a0', '#f59e0b', '#34d399', '#a78bfa', '#fbbf24', '#fb7185', '#22d3ee'];
          let h = 0; for (let i = 0; i < account.id.length; i++) h = (h * 31 + account.id.charCodeAt(i)) | 0;
          avatar.style.backgroundColor = palette[Math.abs(h) % palette.length];
          avatar.style.color = 'white';
          avatar.textContent = avatar_initials_hist(account.label);
          const text = document.createElement('span');
          text.textContent = account.label;
          pill.appendChild(avatar);
          pill.appendChild(text);
        }
      });

      pywebview.api.get_history().then(function(data) {
        const tbody = document.getElementById('table_body');
        // Clear existing rows by removing children (no innerHTML parsing).
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

        if (!data || data.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 4;
          td.className = 'empty-row';
          td.textContent = 'No runs yet. Start one from the main window.';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }

        // Build every row via createElement + textContent so query/status
        // values coming from history.json (ultimately user-controlled) can't
        // be interpreted as HTML.
        const rows = data.slice().reverse();
        for (const item of rows) {
          const statusClass =
            String(item.status).includes('ERROR') ? 'status-error' : 'status-success';
          const tr = document.createElement('tr');

          const dateTd = document.createElement('td');
          dateTd.className = 'cell-meta';
          dateTd.textContent = item.date;

          const timeTd = document.createElement('td');
          timeTd.className = 'cell-meta';
          timeTd.textContent = item.time;

          const queryTd = document.createElement('td');
          queryTd.textContent = item.query;

          const statusTd = document.createElement('td');
          statusTd.className = statusClass;
          statusTd.textContent = item.status;

          tr.appendChild(dateTd);
          tr.appendChild(timeTd);
          tr.appendChild(queryTd);
          tr.appendChild(statusTd);
          tbody.appendChild(tr);
        }
      });
    });
  </script>

</body>
</html>
